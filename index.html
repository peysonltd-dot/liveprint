<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>客製化禮品服務</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK (穩定版本) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg-enter { animation: fadeIn 0.3s ease-out forwards; }
        .chat-container { height: 100dvh; min-height: 550px; max-height: 800px; }
        .bot-bubble { background-color: white; color: #1f2937; border-top-left-radius: 2px; }
        .user-bubble { background-color: #A3E4D7; color: #1f2937; border-top-right-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="peyson-gift-app-mount w-full flex justify-center"></div>

    <script type="text/babel">
        // ==========================================
        // 1. Firebase 初始化
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBIYEIvocHJ02A4CHQq9jqIcnWuMrg3E2s",
            authDomain: "peysoncustomized.firebaseapp.com",
            projectId: "peysoncustomized",
            storageBucket: "peysoncustomized.firebasestorage.app",
            messagingSenderId: "24334519651",
            appId: "1:24334519651:web:9a4b1e33422b8bf7dc1756",
            measurementId: "G-ZEWFSS2LZK"
        };
        
        const appId = "peyson-gift-app"; 
        const DB_PATH = `artifacts/${appId}/public/data/orders`;

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==========================================
        // 2. 主程式架構
        // ==========================================
        const App = () => {
            const [user, setUser] = React.useState(null);
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                const checkAdmin = () => {
                    if (window.location.hash === '#admin') {
                        const pwd = prompt('請輸入管理密碼：');
                        if (pwd === 'admin888') setIsAdmin(true);
                        else { alert('密碼錯誤'); window.location.hash = ''; }
                    } else setIsAdmin(false);
                };
                checkAdmin();
                window.addEventListener('hashchange', checkAdmin);

                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    } else {
                        try { await auth.signInAnonymously(); } 
                        catch (err) { console.error("Auth Error", err); setLoading(false); }
                    }
                });

                return () => unsubscribe();
            }, []);

            if (loading) return (
                <div className="flex flex-col items-center justify-center bg-[#849EB5] w-full max-w-md chat-container text-white p-6 shadow-2xl">
                    <i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                    <p>正在連線系統...</p>
                </div>
            );

            return isAdmin ? <AdminPanel /> : <ChatInterface user={user} />;
        };

        // ==========================================
        // 3. 聊天介面元件
        // ==========================================
        const ChatInterface = ({ user }) => {
            const [messages, setMessages] = React.useState([]);
            const [step, setStep] = React.useState('product'); 
            const [order, setOrder] = React.useState({ product: '', style: '', text: '' });
            const [input, setInput] = React.useState('');
            const [isSearching, setIsSearching] = React.useState(false);
            const [searchId, setSearchId] = React.useState('');
            const [searchResult, setSearchResult] = React.useState(null);
            const endRef = React.useRef(null);

            // 初始化與重新開始邏輯
            const resetSystem = () => {
                setStep('product');
                setOrder({ product: '', style: '', text: '' });
                setMessages([{
                    id: Date.now(), sender: 'bot', text: '您好！歡迎回來 ✨\n請問您今天想要訂製哪一種商品？',
                    options: [{ label: '🧳 行李牌', val: '行李牌' }, { label: '💳 卡夾', val: '卡夾' }]
                }]);
                setIsSearching(false);
                setSearchResult(null);
            };

            React.useEffect(() => {
                resetSystem();
            }, []);

            React.useEffect(() => endRef.current?.scrollIntoView({ behavior: 'smooth' }), [messages]);

            const handleSelect = (val, label) => {
                // 加入使用者訊息
                setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: label }]);
                
                if (step === 'product') {
                    setOrder(prev => ({ ...prev, product: val }));
                    setStep('style');
                    setTimeout(() => {
                        setMessages(prev => [...prev, {
                            id: Date.now()+1, sender: 'bot', text: `好的，已選擇「${val}」。\n接下來請選擇您的款式：`,
                            options: [
                                { label: '款式 A', val: 'A', img: 'https://placehold.co/120x120/A7F3D0/065F46?text=Style+A' },
                                { label: '款式 B', val: 'B', img: 'https://placehold.co/120x120/FDE68A/92400E?text=Style+B' },
                                { label: '款式 C', val: 'C', img: 'https://placehold.co/120x120/BFDBFE/1E40AF?text=Style+C' }
                            ]
                        }]);
                    }, 600);
                } else if (step === 'style') {
                    setOrder(prev => ({ ...prev, style: val }));
                    setStep('text');
                    setTimeout(() => {
                        setMessages(prev => [...prev, { id: Date.now()+2, sender: 'bot', text: '太棒了！最後，請輸入客製文字（10字內）：' }]);
                    }, 600);
                } else if (val === 'confirm') {
                    submitOrder();
                } else if (val === 'reset') {
                    resetSystem();
                }
            };

            const handleTextSubmit = () => {
                if (!input.trim() || step !== 'text') return;
                const txt = input.trim();
                setMessages(prev => [...prev, { id: Date.now(), sender: 'user', text: txt }]);
                setOrder(prev => ({ ...prev, text: txt }));
                setInput('');
                setStep('confirm');
                setTimeout(() => {
                    setMessages(prev => [...prev, {
                        id: Date.now()+3, sender: 'bot', text: `請確認訂單內容：\n\n📌 品項：${order.product}\n🎨 款式：${order.style}\n✍️ 文字：${txt}\n\n確認送出嗎？`,
                        options: [{ label: '✅ 確認送出', val: 'confirm' }, { label: '🔄 重新開始', val: 'reset' }]
                    }]);
                }, 600);
            };

            const submitOrder = async () => {
                // 顯示傳送中訊息
                const loadingId = Date.now();
                setMessages(prev => [...prev, { id: loadingId, sender: 'bot', text: '⏳ 正在產生序號並傳送訂單...' }]);
                
                try {
                    const snapshot = await db.collection(DB_PATH).get();
                    const nextNum = snapshot.size + 1;
                    const serialId = String(nextNum).padStart(3, '0');
                    
                    await db.collection(DB_PATH).doc(serialId).set({
                        ...order,
                        serialId: serialId,
                        uid: user.uid,
                        status: '待確認',
                        createdAt: Date.now()
                    });

                    setStep('done');
                    // 替換掉傳送中訊息
                    setMessages(prev => {
                        const filtered = prev.filter(m => m.id !== loadingId);
                        return [...filtered, {
                            id: Date.now(), sender: 'bot', 
                            text: `🎉 訂單已成功送出！\n\n您的專屬序號為：\n【 ${serialId} 】\n\n請截圖保留此訊息，您可透過右上方查詢進度。`,
                            options: [{ label: '🔄 製作下一筆', val: 'reset' }]
                        }];
                    });
                } catch (err) {
                    alert("儲存失敗: " + err.message);
                }
            };

            const runSearch = async () => {
                if (!searchId.trim()) return;
                const targetId = searchId.trim().padStart(3, '0');
                try {
                    const snap = await db.doc(`${DB_PATH}/${targetId}`).get();
                    if (snap.exists) {
                        setSearchResult(snap.data());
                    } else {
                        alert("查無此序號 (請輸入如 001)");
                        setSearchResult(null);
                    }
                } catch (e) { alert("查詢系統暫時忙碌中"); }
            };

            return (
                <div className="flex flex-col mx-auto w-full max-w-md bg-[#849EB5] shadow-2xl overflow-hidden chat-container relative">
                    <header className="bg-[#2C3E50] text-white p-4 flex justify-between items-center z-20 shadow-md">
                        <div className="font-bold flex items-center gap-2 text-lg"><i className="fa-solid fa-gift"></i> 客製化小幫手</div>
                        <button onClick={() => { setIsSearching(!isSearching); setSearchResult(null); }} className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-full transition-colors">
                            <i className="fa-solid fa-search mr-1"></i> 進度查詢
                        </button>
                    </header>

                    {isSearching && (
                        <div className="absolute top-[60px] left-0 right-0 bg-white/95 backdrop-blur-md p-5 z-30 shadow-2xl border-b msg-enter">
                            <div className="flex justify-between items-center mb-2">
                                <label className="text-xs font-bold text-gray-500 uppercase">請輸入三位數序號</label>
                                <button onClick={() => setIsSearching(false)} className="text-gray-400 hover:text-gray-600"><i className="fa-solid fa-times"></i></button>
                            </div>
                            <div className="flex gap-2">
                                <input value={searchId} onChange={e=>setSearchId(e.target.value)} type="text" placeholder="例如 001" className="flex-1 border-2 border-gray-200 p-2 text-sm rounded-lg focus:border-blue-400 outline-none transition-all" />
                                <button onClick={runSearch} className="bg-[#2C3E50] text-white px-5 py-2 rounded-lg text-sm font-bold active:scale-95 transition-transform">查詢</button>
                            </div>
                            {searchResult && (
                                <div className="mt-4 p-4 bg-gray-50 rounded-xl border border-gray-100 shadow-inner msg-enter">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="font-bold text-gray-800 text-base">{searchResult.product} - {searchResult.style}</div>
                                            <div className="text-gray-500 text-xs mt-1 italic">客製內容: {searchResult.text}</div>
                                        </div>
                                        <div className="bg-blue-600 text-white px-3 py-1 rounded-full font-bold text-[10px] uppercase tracking-wider">{searchResult.status}</div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <main className="flex-1 overflow-y-auto p-4 flex flex-col gap-5 hide-scrollbar bg-[#849EB5]/50">
                        {messages.map(m => (
                            <div key={m.id} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} msg-enter`}>
                                {m.sender === 'bot' && <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center mr-2 shadow-sm text-gray-400"><i className="fa-solid fa-robot text-[10px]"></i></div>}
                                <div className="max-w-[85%] flex flex-col gap-2">
                                    <div className={`p-3 rounded-2xl text-[14px] shadow-md whitespace-pre-wrap leading-relaxed ${m.sender === 'user' ? 'user-bubble' : 'bot-bubble'}`}>
                                        {m.text}
                                    </div>
                                    {m.options && (
                                        <div className={`flex flex-wrap gap-2 mt-1 ${m.options[0]?.img ? 'grid grid-cols-3' : ''}`}>
                                            {m.options.map(o => (
                                                <button key={o.val} onClick={() => handleSelect(o.val, o.label)} className="bg-white hover:bg-blue-50 border border-gray-100 p-2 rounded-xl text-[11px] font-bold shadow-md transition-all active:scale-95 flex flex-col items-center">
                                                    {o.img && <img src={o.img} className="w-full aspect-square rounded-lg mb-2 object-cover border border-gray-50" />}
                                                    {o.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        <div ref={endRef} className="h-4" />
                    </main>

                    <footer className="bg-white p-3 flex gap-2 border-t z-10">
                        <button onClick={resetSystem} title="重設" className="w-10 h-10 rounded-full bg-gray-100 text-gray-400 hover:bg-gray-200 transition-colors flex items-center justify-center shrink-0"><i className="fa-solid fa-undo text-xs"></i></button>
                        <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleTextSubmit()} disabled={step!=='text'} type="text" placeholder={step==='text' ? "請在此輸入文字..." : "請先點選上方選項..."} className="flex-1 bg-gray-50 border border-gray-200 rounded-full px-5 py-2 text-sm outline-none focus:border-blue-300 transition-all" />
                        <button onClick={handleTextSubmit} disabled={!input.trim()} className="bg-[#2C3E50] text-white w-10 h-10 rounded-full flex items-center justify-center disabled:opacity-20 transition-all active:scale-90 shadow-lg"><i className="fa-solid fa-paper-plane text-xs"></i></button>
                    </footer>
                </div>
            );
        };

        // ==========================================
        // 4. 管理後台元件
        // ==========================================
        const AdminPanel = () => {
            const [orders, setOrders] = React.useState([]);
            React.useEffect(() => {
                const unsubscribe = db.collection(DB_PATH).onSnapshot(snap => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setOrders(list.sort((a,b) => b.id.localeCompare(a.id))); // 序號降冪排列
                });
                return () => unsubscribe();
            }, []);

            const update = async (id, status) => {
                await db.doc(`${DB_PATH}/${id}`).update({ status });
            };

            return (
                <div className="bg-white min-h-screen w-full max-w-4xl p-8 rounded-2xl shadow-2xl m-4">
                    <div className="flex justify-between items-center mb-8 border-b pb-4">
                        <h2 className="text-2xl font-black text-gray-800">訂單管理系統</h2>
                        <button onClick={() => window.location.hash = ''} className="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg text-sm font-bold text-gray-600 transition-colors">返回前台</button>
                    </div>
                    <div className="overflow-x-auto rounded-xl border border-gray-100">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gray-50 text-gray-400 font-bold uppercase tracking-wider">
                                <tr>
                                    <th className="p-4">序號</th><th className="p-4">訂製內容</th><th className="p-4">客製文字</th><th className="p-4">目前狀態</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-50">
                                {orders.map(o => (
                                    <tr key={o.id} className="hover:bg-blue-50/30 transition-colors">
                                        <td className="p-4 font-mono font-bold text-blue-600">#{o.id}</td>
                                        <td className="p-4">
                                            <div className="font-bold text-gray-700">{o.product}</div>
                                            <div className="text-[10px] text-gray-400">款式: {o.style}</div>
                                        </td>
                                        <td className="p-4"><span className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded font-bold text-xs">{o.text}</span></td>
                                        <td className="p-4">
                                            <select value={o.status} onChange={e=>update(o.id, e.target.value)} className="border border-gray-200 p-2 rounded-lg text-xs bg-white focus:ring-2 focus:ring-blue-100 outline-none cursor-pointer">
                                                {['待確認','已確認','製作中','完成','取消'].map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const mount = () => {
            document.querySelectorAll('.peyson-gift-app-mount').forEach(node => {
                if (!node.hasAttribute('data-react-mounted')) {
                    node.setAttribute('data-react-mounted', 'true');
                    ReactDOM.createRoot(node).render(<App />);
                }
            });
        };
        mount();
        setInterval(mount, 2000);
    </script>
</body>
</html>
