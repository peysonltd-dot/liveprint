<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>客製化禮品服務</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* 獨立版專屬安全排版：適應手機動態網址列，隱藏醜醜的滾動條 */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      background-color: #8babb0; 
      overflow: hidden; 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================================
    // Firebase 設定
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBlYElvocHJ02A4CHQq9jqIcnWuMrg3E2s",
      authDomain: "peysoncustomized.firebaseapp.com",
      projectId: "peysoncustomized",
      storageBucket: "peysoncustomized.firebasestorage.app",
      messagingSenderId: "24334519651",
      appId: "1:24334519651:web:9a4b1e33422b8bf7dc1756",
      measurementId: "G-ZEWFSS2LZK"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const collectionName = 'gift_orders';

    // 狀態對應表與顏色設定
    const STATUS_MAP = {
      'pending': '待確認',
      'confirmed': '已確認',
      'processing': '製作中',
      'completed': '完成',
      'cancelled': '取消'
    };
    const STATUS_COLORS = {
      'pending': 'bg-gray-100 text-gray-700',
      'confirmed': 'bg-blue-100 text-blue-700',
      'processing': 'bg-orange-100 text-orange-700',
      'completed': 'bg-green-100 text-green-700',
      'cancelled': 'bg-red-100 text-red-700'
    };

    // SVG 圖示組件
    const SendIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
    const LockIcon = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const DashIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>;
    const MsgIcon = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
    const DLIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const CheckIcon = ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M9 12l2 2 4-4"></path></svg>;
    const ClockIcon = ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const BackIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const RefreshIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>;

    function App() {
      const [user, setUser] = useState(null);
      const [orders, setOrders] = useState([]);
      const [currentRoute, setCurrentRoute] = useState(window.location.hash);
      const [authError, setAuthError] = useState('');

      useEffect(() => {
        const handleHashChange = () => setCurrentRoute(window.location.hash);
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      useEffect(() => {
        auth.signInAnonymously().catch(err => {
          console.error("驗證錯誤:", err);
          setAuthError(`連線錯誤，請確認網域已在 Firebase Authentication 授權白名單內。`);
        });
        
        const unsubscribe = auth.onAuthStateChanged(currentUser => setUser(currentUser));
        return () => unsubscribe && unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubscribe = db.collection(collectionName).onSnapshot(snapshot => {
          const fetchedOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          fetchedOrders.sort((a, b) => {
            const timeA = a.createdAt?.toMillis() || 0;
            const timeB = b.createdAt?.toMillis() || 0;
            return timeB - timeA;
          });
          setOrders(fetchedOrders);
        }, (err) => {
          console.error("Firestore 讀取錯誤:", err);
          setAuthError("資料庫連線失敗，請稍後再試。");
        });
        return () => unsubscribe();
      }, [user]);

      if (authError) {
        return (
          <div className="flex items-center justify-center h-[100dvh] bg-red-50 p-4">
            <div className="bg-white p-6 rounded-xl shadow-lg border border-red-200 max-w-md w-full text-center">
              <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><span className="text-2xl font-bold">!</span></div>
              <h3 className="text-xl font-bold text-gray-800 mb-2">系統連線提示</h3>
              <p className="text-red-600 font-medium mb-4">{authError}</p>
            </div>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="flex items-center justify-center h-[100dvh] bg-[#8babb0]">
            <div className="bg-white/90 px-8 py-6 rounded-2xl flex flex-col items-center shadow-lg">
              <div className="w-10 h-10 border-4 border-[#00B900] border-t-transparent rounded-full animate-spin mb-3"></div>
              <p className="text-gray-600 font-bold tracking-wider">系統載入中...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="h-[100dvh] w-full font-sans">
          {currentRoute === '#admin' ? <AdminRoute orders={orders} /> : <UserChat user={user} orders={orders} />}
        </div>
      );
    }

    function AdminRoute({ orders }) {
      const [isLocked, setIsLocked] = useState(true);
      const [password, setPassword] = useState('');
      const [errorMsg, setErrorMsg] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        // 後台密碼預設為 admin888
        if (password === 'admin888') {
          setIsLocked(false); setErrorMsg('');
        } else {
          setErrorMsg('密碼錯誤！請重新輸入。'); setPassword('');
        }
      };

      if (isLocked) {
        return (
          <div className="h-[100dvh] w-full flex items-center justify-center bg-slate-900 p-4">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
              <div className="text-center mb-8">
                <div className="mx-auto w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4"><LockIcon size={32}/></div>
                <h2 className="text-2xl font-bold text-gray-800">管理系統</h2>
              </div>
              <form onSubmit={handleLogin} className="space-y-6">
                <div>
                  <input type="password" placeholder="輸入密碼" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 border border-gray-300 rounded-xl text-center text-xl tracking-widest focus:ring-2 focus:ring-blue-500 focus:outline-none" autoFocus/>
                  {errorMsg && <p className="text-red-500 text-sm mt-2 text-center font-bold">{errorMsg}</p>}
                </div>
                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 transition-colors shadow-md">進入後台</button>
                <div className="text-center pt-4">
                  <button type="button" onClick={() => window.location.hash = ''} className="text-gray-400 flex items-center justify-center gap-1 mx-auto hover:text-gray-600"><BackIcon /> 返回前台</button>
                </div>
              </form>
            </div>
          </div>
        );
      }
      return <AdminDashboard orders={orders} />;
    }

    function UserChat({ user, orders }) {
      const [messages, setMessages] = useState([]);
      const [inputText, setInputText] = useState('');
      const [step, setStep] = useState('choose_gift'); 
      const [orderData, setOrderData] = useState({ gift: '', design: '', text: '' });
      const messagesEndRef = useRef(null);

      const startConversation = () => {
        setMessages([{
          id: Date.now(), sender: 'bot', text: '歡迎來到客製化禮品服務！🎉\n請選擇您想要的禮品：',
          options: [{ label: '🪪 質感卡夾', value: '卡夾' }, { label: '🧳 專屬行李牌', value: '行李牌' }]
        }]);
        setStep('choose_gift');
        setOrderData({ gift: '', design: '', text: '' });
      };

      useEffect(() => {
        startConversation();
      }, []);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const addMessage = (sender, text, options = null, imageOptions = null, actions = null) => {
        setMessages(prev => [...prev, { id: Date.now() + Math.random(), sender, text, options, imageOptions, actions }]);
      };

      const handleRestart = () => {
        const latestOrder = orders.find(o => o.userId === user.uid);
        
        if (latestOrder) {
          const currentStatus = latestOrder.status || 'pending';
          // 防呆機制：製作中、完成、取消狀態不允許重新製作
          if (['processing', 'completed', 'cancelled'].includes(currentStatus)) {
            let reason = currentStatus === 'processing' ? '已經在製作中' : currentStatus === 'completed' ? '已經製作完成' : '已被取消';
            addMessage('bot', `⚠️ 抱歉，您的訂單目前【${reason}】，無法重新製作喔！\n如有需要請聯繫客服人員。`);
            return;
          }
        }
        
        addMessage('user', '重新製作');
        setTimeout(() => {
          startConversation();
        }, 500);
      };

      const handleOptionClick = (value, label) => {
        addMessage('user', label);
        if (step === 'choose_gift') {
          setOrderData(prev => ({ ...prev, gift: value }));
          setTimeout(() => {
            if (value === '行李牌') {
              addMessage('bot', `您選擇了「${value}」！\n請向右滑動，點選喜歡的公版圖案：`, null, [
                { label: '款式A (派對小熊)', value: '派對小熊', imageUrl: 'https://img.shoplineapp.com/media/image_clips/69cde167e526e03339687938/original.jpg?1775100262=&owner_id=66221c5c384dbb002ec45c18' },
                { label: '款式B (夏日沁涼)', value: '夏日沁涼', imageUrl: 'https://img.shoplineapp.com/media/image_clips/69cde1672d0c5da17827ce05/original.jpg?1775100262=&owner_id=66221c5c384dbb002ec45c18' },
                { label: '款式C (優雅花草)', value: '優雅花草', imageUrl: 'https://img.shoplineapp.com/media/image_clips/69cde167a02d45240381f952/original.jpg?1775100262=&owner_id=66221c5c384dbb002ec45c18' }
              ]);
            } else {
              addMessage('bot', `您選擇了「${value}」！\n請選擇公版圖案：`, [
                { label: '🎨 經典素面', value: '經典素面' }, { label: '💼 商務質感', value: '商務質感' }, { label: '🌸 簡約花紋', value: '簡約花紋' }
              ]);
            }
            setStep('choose_design');
          }, 500);
        } else if (step === 'choose_design') {
          setOrderData(prev => ({ ...prev, design: value }));
          setTimeout(() => { addMessage('bot', '請輸入想印製的文字\n（限 10 字以內）：'); setStep('input_text'); }, 500);
        }
      };

      const handleSendText = async () => {
        if (!inputText.trim()) return;
        const userText = inputText.trim();
        addMessage('user', userText); setInputText('');

        if (step === 'input_text') {
          if (userText.length > 10) { setTimeout(() => addMessage('bot', '⚠️ 字數超過限制，請重新輸入：'), 500); return; }

          let maxSerial = 0;
          orders.forEach(o => {
            const num = parseInt(o.serialNumber, 10);
            if (!isNaN(num) && num > maxSerial) maxSerial = num;
          });
          const formattedSerial = String(maxSerial + 1).padStart(3, '0');

          // 新增訂單，預設狀態為 pending (待確認)
          const newOrder = { 
            ...orderData, 
            text: userText, 
            userId: user.uid, 
            status: 'pending', 
            serialNumber: formattedSerial, 
            createdAt: firebase.firestore.FieldValue.serverTimestamp() 
          };

          try {
            await db.collection(collectionName).add(newOrder);
            setStep('finished');
            setTimeout(() => {
              addMessage('bot', `已收到申請！✅\n專屬序號：No.${formattedSerial}\n\n隨時可輸入『查詢進度』查看狀態。如果想修改，可點擊下方重新製作：`, null, null, [
                { label: '重新製作', action: 'restart' }
              ]);
            }, 800);
          } catch (e) { addMessage('bot', '系統發生錯誤，請稍後再試。'); }
        } else if (step === 'finished') {
          if (userText === '查詢進度') {
            setTimeout(() => {
              const latestOrder = orders.find(o => o.userId === user.uid);
              if (latestOrder && latestOrder.serialNumber) {
                const statusText = STATUS_MAP[latestOrder.status] || '處理中';
                addMessage('bot', `序號 No.${latestOrder.serialNumber}\n目前狀態：【${statusText}】`, null, null, [
                  { label: '重新製作', action: 'restart' }
                ]);
              } else addMessage('bot', '查無申請紀錄喔！');
            }, 600);
          } else if (userText === '重新製作') {
             handleRestart();
          } else {
             setTimeout(() => addMessage('bot', '如需查詢，請輸入『查詢進度』喔！'), 500);
          }
        }
      };

      return (
        <div className="h-[100dvh] w-full flex justify-center items-center md:py-8 bg-[#8babb0]">
          <div className="flex flex-col h-full w-full max-w-md bg-white md:rounded-3xl overflow-hidden shadow-2xl border border-gray-300">
            {/* 標題列 */}
            <div className="bg-[#00B900] text-white p-4 flex items-center justify-between shrink-0 shadow-sm z-10">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-white rounded-full flex items-center justify-center text-[#00B900] font-bold text-xl shrink-0 shadow-inner">G</div>
                <div><h2 className="font-bold text-lg tracking-wider">客製化禮品服務</h2></div>
              </div>
              <button onClick={() => window.location.hash = '#admin'} className="text-white opacity-30 hover:opacity-100 p-2 shrink-0 transition-opacity"><LockIcon /></button>
            </div>

            {/* 對話區 */}
            <div className="flex-1 overflow-y-auto p-4 bg-[#7494C0] space-y-4">
              {messages.map((msg) => (
                <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} mb-4`}>
                  {msg.sender === 'bot' && <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-[#00B900] font-bold mr-2 mt-1 shadow-sm shrink-0">G</div>}
                  <div className={`max-w-[75%] flex flex-col gap-2`}>
                    <div className={`p-3 rounded-2xl whitespace-pre-wrap shadow-sm text-[15px] leading-relaxed ${msg.sender === 'user' ? 'bg-[#85E249] text-black rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none'}`}>{msg.text}</div>
                    
                    {/* 文字選項 */}
                    {msg.options && <div className="flex flex-col gap-2 mt-1">{msg.options.map((opt, idx) => <button key={idx} onClick={() => handleOptionClick(opt.value, opt.label)} disabled={step !== 'choose_gift' && step !== 'choose_design'} className="bg-white py-2.5 px-4 rounded-xl text-sm disabled:opacity-50 border border-gray-100 shadow-sm hover:bg-gray-50 active:bg-gray-100 transition-colors font-medium text-gray-700">{opt.label}</button>)}</div>}
                    
                    {/* 圖片選項 */}
                    {msg.imageOptions && <div className="flex overflow-x-auto gap-2 pb-2 mt-2 -mx-2 px-2 hide-scrollbar snap-x">{msg.imageOptions.map((opt, idx) => <button key={idx} onClick={() => handleOptionClick(opt.value, opt.label)} disabled={step !== 'choose_gift' && step !== 'choose_design'} className="flex-none w-40 bg-white rounded-xl border border-gray-100 p-1.5 snap-center shadow-sm hover:bg-gray-50 active:bg-gray-100 transition-colors"><div className="w-full aspect-[2/3] bg-gray-100 rounded-lg overflow-hidden"><img src={opt.imageUrl} className="w-full h-full object-cover" /></div><div className="py-2 text-sm font-bold text-gray-700">{opt.label}</div></button>)}</div>}
                    
                    {/* 功能操作按鈕 (重新製作) */}
                    {msg.actions && <div className="flex flex-col gap-2 mt-1">{msg.actions.map((act, idx) => <button key={idx} onClick={handleRestart} disabled={step !== 'finished'} className="bg-white/90 py-2 px-4 rounded-xl text-sm text-blue-600 font-bold border border-blue-100 shadow-sm flex justify-center items-center gap-1 hover:bg-white active:bg-blue-50 transition-colors"><RefreshIcon/>{act.label}</button>)}</div>}
                  </div>
                </div>
              ))}
              <div ref={messagesEndRef} />
            </div>

            {/* 輸入區：保證不變形 */}
            <div className="p-3 bg-white border-t border-gray-200 flex gap-2 items-center shrink-0 w-full z-10 pb-6 md:pb-3">
              <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendText()} disabled={step === 'choose_gift' || step === 'choose_design'} placeholder={step === 'input_text' ? '請輸入想印製文字...' : step === 'finished' ? '輸入『查詢進度』...' : '請先點選按鈕...'} className="flex-1 min-w-0 bg-gray-100 border-none rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-[#00B900] disabled:bg-gray-50 text-[15px]"/>
              <button onClick={handleSendText} disabled={!inputText.trim() || (step === 'choose_gift' || step === 'choose_design')} className="bg-[#00B900] text-white w-12 h-12 min-w-[48px] rounded-full flex items-center justify-center disabled:opacity-50 shrink-0 shadow-sm hover:bg-green-600 active:bg-green-700 transition-colors"><SendIcon /></button>
            </div>
          </div>
        </div>
      );
    }

    function AdminDashboard({ orders }) {
      const [editingId, setEditingId] = useState(null);
      const [serialInput, setSerialInput] = useState('');

      const handleUpdateSerial = async (orderId) => {
        if (!serialInput.trim()) return;
        await db.collection(collectionName).doc(orderId).update({ serialNumber: serialInput.trim() });
        setEditingId(null); 
        setSerialInput('');
      };

      // 變更狀態下拉選單
      const handleStatusChange = async (orderId, newStatus) => {
        try {
          await db.collection(collectionName).doc(orderId).update({ status: newStatus });
        } catch (error) {
          alert('狀態更新失敗');
          console.error(error);
        }
      };

      const exportToCSV = () => {
        const csv = ['時間,客戶ID,禮品種類,款式,客製化文字,狀態,發配序號'].concat(
          orders.map(o => `"${o.createdAt ? new Date(o.createdAt.toMillis()).toLocaleString() : ''}","${o.userId.substring(0,8)}","${o.gift}","${o.design}","${o.text}","${STATUS_MAP[o.status]||'待確認'}","${o.serialNumber||''}"`)
        ).join('\n');
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = "訂單.csv";
        link.click();
      };

      return (
        <div className="h-[100dvh] w-full flex flex-col bg-gray-50 overflow-y-auto">
          <div className="flex justify-between items-center p-4 bg-white shadow-sm sticky top-0 z-20">
            <h2 className="text-xl font-bold flex items-center gap-2"><DashIcon/> 後台管理中心</h2>
            <div className="flex gap-2">
              <button onClick={exportToCSV} className="bg-emerald-600 text-white px-3 py-2 rounded-lg flex items-center gap-1 text-sm shadow-sm hover:bg-emerald-700 transition-colors"><DLIcon/>匯出</button>
              <button onClick={() => window.location.hash = ''} className="bg-slate-700 hover:bg-slate-800 text-white px-3 py-2 rounded-lg text-sm transition-colors shadow-sm">返回前台</button>
            </div>
          </div>
          
          <div className="p-4 flex-1">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 max-w-6xl mx-auto">
              <div className="bg-white p-3 rounded-xl border flex items-center gap-2 md:gap-3 shadow-sm"><div className="bg-blue-100 p-2 rounded-lg text-blue-600"><MsgIcon size={20}/></div><div><p className="text-xs text-gray-500 font-bold">總單數</p><p className="text-lg font-bold">{orders.length}</p></div></div>
              <div className="bg-white p-3 rounded-xl border flex items-center gap-2 md:gap-3 shadow-sm"><div className="bg-gray-100 p-2 rounded-lg text-gray-600"><ClockIcon size={20}/></div><div><p className="text-xs text-gray-500 font-bold">待確認</p><p className="text-lg font-bold">{orders.filter(o => o.status === 'pending' || !o.status).length}</p></div></div>
              <div className="bg-white p-3 rounded-xl border flex items-center gap-2 md:gap-3 shadow-sm"><div className="bg-orange-100 p-2 rounded-lg text-orange-600"><ClockIcon size={20}/></div><div><p className="text-xs text-gray-500 font-bold">製作中</p><p className="text-lg font-bold">{orders.filter(o => o.status === 'processing').length}</p></div></div>
              <div className="bg-white p-3 rounded-xl border flex items-center gap-2 md:gap-3 shadow-sm"><div className="bg-green-100 p-2 rounded-lg text-green-600"><CheckIcon size={20}/></div><div><p className="text-xs text-gray-500 font-bold">已完成</p><p className="text-lg font-bold">{orders.filter(o => o.status === 'completed').length}</p></div></div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden max-w-6xl mx-auto">
              <div className="overflow-x-auto">
                <table className="w-full text-left min-w-[900px] border-collapse">
                  <thead className="bg-gray-50 border-b border-gray-200">
                    <tr>
                      <th className="p-4 w-40 text-sm font-bold text-gray-600">時間</th>
                      <th className="p-4 text-sm font-bold text-gray-600">禮品 / 款式</th>
                      <th className="p-4 w-48 text-sm font-bold text-gray-600">印製文字</th>
                      <th className="p-4 w-32 text-sm font-bold text-gray-600">序號修改</th>
                      <th className="p-4 w-48 text-center text-sm font-bold text-gray-600">訂單狀態</th>
                    </tr>
                  </thead>
                  <tbody>
                    {orders.map(order => (
                      <tr key={order.id} className="border-b hover:bg-gray-50 transition-colors">
                        <td className="p-4 text-xs text-gray-500">{order.createdAt ? new Date(order.createdAt.toMillis()).toLocaleString() : ''}</td>
                        <td className="p-4">
                           <div className="flex flex-col gap-1">
                             <span className="w-fit bg-gray-100 text-gray-800 px-2 py-0.5 rounded text-xs font-bold">{order.gift}</span>
                             <span className="text-sm text-gray-600 font-medium">{order.design}</span>
                           </div>
                        </td>
                        <td className="p-4 font-bold text-gray-800 text-[15px]">"{order.text}"</td>
                        <td className="p-4">
                          {editingId === order.id ? (
                            <div className="flex gap-1"><input type="text" className="w-14 border border-gray-300 rounded px-1 text-sm text-center focus:ring-2 focus:ring-blue-500 outline-none" value={serialInput} onChange={e => setSerialInput(e.target.value)} /><button onClick={() => handleUpdateSerial(order.id)} className="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs transition-colors shadow-sm">儲存</button></div>
                          ) : (
                            <div className="flex gap-2 items-center"><span className="font-bold text-blue-700 text-[15px]">No.{order.serialNumber||'--'}</span><button onClick={() => {setEditingId(order.id); setSerialInput(order.serialNumber||'');}} className="text-blue-500 hover:text-blue-700 text-xs font-bold underline px-1 py-0.5">修改</button></div>
                          )}
                        </td>
                        <td className="p-4 text-center">
                          <select 
                            value={order.status || 'pending'} 
                            onChange={(e) => handleStatusChange(order.id, e.target.value)}
                            className={`border border-gray-200 rounded-lg px-2 py-1.5 text-sm font-bold w-full focus:outline-none appearance-none text-center cursor-pointer shadow-sm ${STATUS_COLORS[order.status || 'pending']}`}
                            style={{ textAlignLast: 'center' }}
                          >
                            <option value="pending">待確認</option>
                            <option value="confirmed">已確認</option>
                            <option value="processing">製作中</option>
                            <option value="completed">完成</option>
                            <option value="cancelled">取消</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                    {orders.length === 0 && (
                      <tr><td colSpan="5" className="text-center p-8 text-gray-500 font-medium">尚無訂單紀錄</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 將 React 應用掛載到 root 節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
